<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- SEO -->
  <title>TapTap — Rhythm Game</title>
  <meta name="description" content="TapTap is a browser-based rhythm game inspired by Elite Beat Agents. Tap the beat, follow the rhythm!" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap"
    rel="stylesheet"
  />

  <style>
    /* Critical inline styles — prevent flash of unstyled content */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }
    #app {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #game-canvas {
      display: block;
      touch-action: none;
      cursor: none;
    }
    #ui-layer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #loading-screen {
      position: fixed;
      inset: 0;
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      font-family: 'Bangers', cursive;
      color: #fff;
      transition: opacity 0.5s ease;
    }
    #loading-screen .logo {
      font-size: clamp(3rem, 10vw, 6rem);
      letter-spacing: 0.1em;
      color: #ff6b35;
      text-shadow: 4px 4px 0 #ff2d55, 8px 8px 0 rgba(255,45,85,0.3);
      animation: pulse 1s ease-in-out infinite;
    }
    #loading-screen .subtitle {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.8rem, 2vw, 1rem);
      color: rgba(255,255,255,0.6);
      margin-top: 0.5rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }
    #loading-bar-track {
      width: clamp(200px, 40vw, 400px);
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin-top: 2rem;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff6b35, #ff2d55);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Loading screen (shown while JS initializes) -->
    <div id="loading-screen">
      <div class="logo">TapTap</div>
      <div class="subtitle">Rhythm Game</div>
      <div id="loading-bar-track">
        <div id="loading-bar"></div>
      </div>
    </div>

    <!-- Main game canvas (Canvas 2D) -->
    <canvas id="game-canvas"></canvas>

    <!-- HTML UI overlay (menus, HUD, etc.) -->
    <div id="ui-layer"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
